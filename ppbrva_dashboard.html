<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPBRVA TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #04051a;
  --panel: #070b22;
  --cyan:  #00f5ff;
  --pink:  #ff2d78;
  --yel:   #fff200;
  --grn:   #39ff14;
  --pur:   #bd00ff;
  --dim:   #1e2450;
  --dtxt:  #3a4580;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }

body {
  background: var(--bg);
  background-image:
    linear-gradient(rgba(0,245,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.035) 1px, transparent 1px);
  background-size: 32px 32px;
  color: var(--cyan);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
  padding-bottom: 44px;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px
  );
  pointer-events: none;
  z-index: 9900;
}

/* Vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, transparent 55%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
  z-index: 9901;
}

.screen { max-width: 960px; margin: 0 auto; padding: 24px 18px; }

/* ── HEADER ── */
.hdr { text-align:center; padding: 22px 0 26px; }
.hdr-eyebrow { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--pur); letter-spacing:4px; margin-bottom:14px; }
.hdr-title {
  font-family:'Press Start 2P',monospace; font-size:30px; letter-spacing:5px; line-height:1.4;
  background: linear-gradient(175deg, var(--cyan) 0%, var(--pink) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter: drop-shadow(0 0 24px rgba(0,245,255,0.5));
  margin-bottom:10px;
}
.hdr-sub { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--pink); letter-spacing:3px; text-shadow:0 0 12px var(--pink); margin-bottom:16px; }
.hdr-clock { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--yel); text-shadow:0 0 10px var(--yel); letter-spacing:2px; }
.hdr-line { height:3px; background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),var(--pur),transparent); margin-top:22px; }

/* ── STATS ROW ── */
.stats-row { display:flex; gap:6px; margin:16px 0 0; flex-wrap:wrap; }
.stat-chip {
  font-family:'Press Start 2P',monospace; font-size:8px;
  padding:6px 12px; border:1px solid var(--dim);
  display:flex; align-items:center; gap:7px;
  background: var(--panel);
}
.pip { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.pip-g { background:var(--grn); box-shadow:0 0 5px var(--grn); animation: blink 2.5s ease infinite; }
.pip-r { background:var(--pink); box-shadow:0 0 5px var(--pink); }
.pip-y { background:var(--yel); box-shadow:0 0 5px var(--yel); animation: blink 1.8s ease infinite; }
.pip-c { background:var(--cyan); box-shadow:0 0 5px var(--cyan); }

/* ── SECTION LABEL ── */
.sec {
  font-family:'Press Start 2P',monospace; font-size:9px;
  letter-spacing:3px; color:var(--yel); text-shadow:0 0 8px var(--yel);
  margin:26px 0 14px; display:flex; align-items:center; gap:10px;
}
.sec::after { content:''; flex:1; height:1px; background:var(--dim); }

/* ── SESSION CARD ── */
.card {
  background:var(--panel); border:1px solid var(--dim);
  padding:14px 16px; margin-bottom:10px; position:relative;
  transition: border-color .2s, box-shadow .2s;
}
.card:hover { border-color:rgba(0,245,255,0.4); box-shadow:0 0 14px rgba(0,245,255,0.08); }
.card.full {
  border-color:var(--pink);
  box-shadow:0 0 22px rgba(255,45,120,0.22);
}
.card.full::before {
  content:'▶ FULL ◀';
  font-family:'Press Start 2P',monospace; font-size:7px; color:var(--pink);
  text-shadow:0 0 8px var(--pink);
  position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  background:var(--panel); padding:0 8px;
  animation: blink .85s step-end infinite;
}
.card.live {
  border-color:var(--yel);
  box-shadow:0 0 18px rgba(255,242,0,0.18);
}
.card.live::before {
  content:'▶ LIVE ◀';
  font-family:'Press Start 2P',monospace; font-size:7px; color:var(--yel);
  text-shadow:0 0 8px var(--yel);
  position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  background:var(--panel); padding:0 8px;
  animation: blink .6s step-end infinite;
}
.card.completed { opacity:0.38; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:11px; }
.card-name { font-family:'Press Start 2P',monospace; font-size:10px; line-height:1.7; color:var(--cyan); text-shadow:0 0 8px rgba(0,245,255,0.4); }
.card.full .card-name { color:var(--yel); text-shadow:0 0 8px rgba(255,242,0,0.5); }
.card.live .card-name { color:var(--yel); }
.card-when { font-size:11px; color:var(--dtxt); text-align:right; line-height:1.8; }
.card-countdown { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--grn); margin-top:3px; }

.bar-row { display:flex; align-items:center; gap:12px; margin-bottom:9px; }
.bar { flex:1; height:11px; background:#080c20; border:1px solid var(--dim); overflow:hidden; }
.bar-fill {
  height:100%; position:relative;
  background:linear-gradient(90deg,var(--cyan),var(--pur));
  box-shadow:0 0 8px rgba(0,245,255,0.5);
  transition: width .6s ease;
}
.bar-fill::after { content:''; position:absolute; top:0; right:0; width:3px; height:100%; background:rgba(255,255,255,0.5); }
.bar.red .bar-fill { background:linear-gradient(90deg,var(--pink),#dd0044); box-shadow:0 0 10px rgba(255,45,120,0.6); animation:pulse-bar 1.6s ease-in-out infinite; }
.bar-lbl { font-family:'Press Start 2P',monospace; font-size:10px; min-width:62px; text-align:right; }
.card.full .bar-lbl { color:var(--pink); text-shadow:0 0 6px var(--pink); }

.card-players { font-size:11px; color:var(--dtxt); }
.card-players .name { color:#7a8fcc; }

/* ── THIEF SECTION ── */
.thief-wrap {
  border:2px solid var(--pink); padding:20px; margin-bottom:12px;
  box-shadow:0 0 40px rgba(255,45,120,0.35), inset 0 0 40px rgba(255,45,120,0.04);
  position:relative; overflow:hidden;
  background: var(--panel);
}
.thief-wrap::before {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,45,120,0.025) 12px,rgba(255,45,120,0.025) 24px);
  pointer-events:none;
}
.thief-title { font-family:'Press Start 2P',monospace; font-size:14px; color:var(--pink); text-shadow:0 0 18px var(--pink); letter-spacing:2px; margin-bottom:6px; animation:blink .65s step-end infinite; }
.thief-session { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yel); letter-spacing:1px; margin-bottom:14px; line-height:1.9; }
.thief-table { width:100%; border-collapse:collapse; position:relative; z-index:1; }
.thief-table td { padding:4px 8px 4px 0; font-size:12px; }
.thief-table td:first-child { color:var(--dtxt); width:180px; }
.thief-table td:last-child { color:#ffaacc; }
.thief-suspect { font-family:'Press Start 2P',monospace !important; font-size:12px !important; color:var(--pink) !important; text-shadow:0 0 8px var(--pink); }

.thief-empty {
  border:1px solid var(--dim); padding:30px; text-align:center;
  background:var(--panel);
  font-family:'Press Start 2P',monospace; font-size:8px; color:var(--dtxt);
  letter-spacing:2px; line-height:2.8;
}

/* ── HALL OF SHAME ── */
.hof-row {
  display:flex; align-items:center; gap:16px;
  padding:10px 14px; margin-bottom:4px;
  background:var(--panel); border-left:3px solid var(--pink);
  font-family:'Press Start 2P',monospace; font-size:8px;
}
.hof-rank { color:var(--pink); min-width:26px; }
.hof-name { flex:1; color:#ffaacc; }
.hof-ses { color:var(--dtxt); font-size:7px; }
.hof-ts { color:var(--dtxt); font-size:7px; text-align:right; }

/* ── ACTIVITY LOG ── */
.log-row {
  display:flex; gap:14px; font-size:12px;
  padding:5px 10px; margin-bottom:2px;
  border-left:2px solid transparent; background:transparent;
  transition:background .2s;
}
.log-row:hover { background:rgba(255,255,255,0.02); }
.log-row.join   { border-left-color:var(--grn);  background:rgba(57,255,20,0.025); }
.log-row.cancel { border-left-color:var(--pink); background:rgba(255,45,120,0.025); }
.log-row.full   { border-left-color:var(--yel);  background:rgba(255,242,0,0.025); }
.log-row.freed  { border-left-color:var(--cyan); background:rgba(0,245,255,0.02); }
.log-ts  { color:var(--dtxt); min-width:52px; }
.log-evt { min-width:72px; font-weight:bold; }
.log-row.join   .log-evt { color:var(--grn); }
.log-row.cancel .log-evt { color:var(--pink); }
.log-row.full   .log-evt { color:var(--yel); }
.log-row.freed  .log-evt { color:var(--cyan); }
.log-who { color:#8899cc; }
.log-ses { color:var(--dtxt); font-size:11px; }

/* ── GRID ── */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* ── MOBILE ── */
@media(max-width:640px){
  .screen { padding:14px 10px; }
  .grid2 { grid-template-columns:1fr; }
  .hdr-title { font-size:18px; letter-spacing:2px; }
  .hdr-eyebrow { font-size:6px; letter-spacing:2px; }
  .hdr-sub { font-size:6px; letter-spacing:1px; }
  .hdr-clock { font-size:9px; }
  .sec { font-size:7px; letter-spacing:2px; margin:18px 0 10px; }
  .stat-chip { font-size:6px; padding:5px 8px; }
  .card { padding:10px 12px; }
  .card-name { font-size:8px; }
  .card-when { font-size:10px; }
  .card-countdown { font-size:7px; }
  .bar-lbl { font-size:8px; min-width:50px; }
  .card-players { font-size:10px; }
  .card-top { flex-direction:column; gap:4px; }
  .card-when { text-align:left; }
  .thief-title { font-size:10px; }
  .thief-session { font-size:6px; }
  .thief-table td { font-size:10px; padding:3px 6px 3px 0; }
  .thief-table td:first-child { width:auto; }
  .thief-empty { font-size:6px; padding:18px 10px; }
  .hof-row { padding:8px 10px; gap:10px; }
  .hof-row > * { font-size:6px !important; }
  .log-row { font-size:10px; gap:8px; flex-wrap:wrap; }
  .log-ts { min-width:auto; font-size:9px; }
  .log-evt { min-width:auto; font-size:10px; }
  .log-ses { font-size:9px; }
  .sbar { padding:0 10px; height:34px; }
  .sbar-item { font-size:6px; gap:5px; }
  .refresh-btn { font-size:6px; padding:4px 8px; }
}

/* ── STATUS BAR ── */
.sbar {
  position:fixed; bottom:0; left:0; right:0; height:38px;
  background:linear-gradient(90deg,#040718,#090420,#040718);
  border-top:2px solid var(--cyan);
  box-shadow:0 -4px 24px rgba(0,245,255,0.18);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  font-family:'Press Start 2P',monospace; font-size:8px; letter-spacing:1px;
  z-index:9800;
}
.sbar-item { display:flex; align-items:center; gap:8px; color:var(--dtxt); }
.sbar-item.bright { color:var(--cyan); }

/* ── REFRESH BUTTON ── */
.refresh-btn {
  font-family:'Press Start 2P',monospace; font-size:8px;
  background:none; border:1px solid var(--cyan); color:var(--cyan);
  padding:5px 12px; cursor:pointer; letter-spacing:2px;
  box-shadow:0 0 8px rgba(0,245,255,0.2);
  transition:all .2s;
}
.refresh-btn:hover { background:rgba(0,245,255,0.08); box-shadow:0 0 16px rgba(0,245,255,0.4); }
.refresh-btn:active { transform:scale(0.97); }

/* ── ANIMATIONS ── */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.65} }
@keyframes slide-in { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.new-item { animation: slide-in .4s ease; }
</style>
</head>

// ── Render engine ─────────────────────────────────────────────────────────

function fmtTs(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function ageStr(iso) {
  if (!iso) return '';
  const secs = (Date.now() - new Date(iso).getTime()) / 1000;
  if (secs < 90)  return 'just now';
  if (secs < 3600) return Math.round(secs/60) + 'm ago';
  return Math.round(secs/3600) + 'h ago';
}

function countdown(isoStart) {
  if (!isoStart) return '';
  const diff = new Date(isoStart).getTime() - Date.now();
  if (diff <= 0) return '';
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  return (h ? h+'h ' : '') + String(m).padStart(2,'0') + 'm ' + String(s).padStart(2,'0') + 's';
}

function playerList(registrants, max) {
  if (!registrants || !registrants.length) return '<span style="color:var(--dtxt)">no sign-ups yet</span>';
  const shown = registrants.slice(0, max).map(n => `<span class="name">${n}</span>`).join(' · ');
  const extra = registrants.length > max ? `  <span style="color:var(--dtxt)">+${registrants.length-max} more</span>` : '';
  return shown + extra;
}

function renderCard(s, compact) {
  const pct   = s.capacity ? Math.min(100, Math.round(s.count/s.capacity*100)) : 0;
  const full  = s.is_full ? ' full' : '';
  const live  = s.status === 'live' ? ' live' : '';
  const done  = s.status === 'completed' ? ' completed' : '';
  const bar   = s.is_full ? ' red' : '';
  const cd    = countdown(s.start_iso);
  const cdHtml = cd && s.status==='upcoming' ? `<div class="card-countdown" data-start="${s.start_iso}">STARTS IN ${cd}</div>` : '';
  const snap  = s.last_snap_ts ? `<span style="color:var(--dtxt);font-size:10px">${ageStr(s.last_snap_ts)}</span>` : '';
  return `
<div class="card${full}${live}${done}">
  <div class="card-top">
    <div>
      <div class="card-name">${s.title}</div>
      ${cdHtml}
    </div>
    <div class="card-when">${s.start_display}<br>${s.end_display ? '→ '+s.end_display : ''}<br>${snap}</div>
  </div>
  <div class="bar-row">
    <div class="bar${bar}"><div class="bar-fill" style="width:${pct}%"></div></div>
    <div class="bar-lbl">${s.count} / ${s.capacity ?? '?'}</div>
  </div>
  <div class="card-players">${playerList(s.registrants, compact ? 4 : 7)}</div>
</div>`;
}

function renderThieves(thieves, sessions) {
  const section = document.getElementById('thief-section');
  const hof     = document.getElementById('hof-list');
  const secHof  = document.getElementById('sec-hof');

  if (!thieves || !thieves.length) {
    section.innerHTML = `
<div class="thief-empty">
  NO THIEVES DETECTED<br>
  <span style="animation:blink 1s step-end infinite;display:inline-block;color:var(--grn)">● SYSTEM MONITORING</span>
</div>`;
    secHof.style.display = 'none';
    hof.innerHTML = '';
    return;
  }

  // Show individual thief cards
  section.innerHTML = thieves.map(t => `
<div class="thief-wrap">
  <div class="thief-title">⚠ SESSION THIEF DETECTED!</div>
  <div class="thief-session">${t.session_title}  ·  ${t.session_start}</div>
  <table class="thief-table">
    <tr><td>SUSPECT</td><td class="thief-suspect">${t.name}</td></tr>
    <tr><td>HELD SPOT WHILE FULL</td><td>${t.last_seen_full_ts}</td></tr>
    <tr><td>WENT ABSENT</td><td>${t.first_absent_ts}</td></tr>
  </table>
</div>`).join('');

  // Hall of shame scoreboard
  secHof.style.display = 'flex';
  hof.innerHTML = thieves.map((t,i) => `
<div class="hof-row">
  <div class="hof-rank">#${i+1}</div>
  <div class="hof-name">${t.name}</div>
  <div class="hof-ses">${t.session_title}</div>
  <div class="hof-ts">${fmtTs(t.first_absent_ts)}</div>
</div>`).join('');
}

function renderActivity(activity) {
  const evtLabel = { join:'JOINED', cancel:'CANCELLED', full:'→ FULL', freed:'FREED' };
  document.getElementById('activity-list').innerHTML = activity.slice(0,20).map(e => `
<div class="log-row ${e.type}">
  <span class="log-ts">${fmtTs(e.ts)}</span>
  <span class="log-evt">${evtLabel[e.type]||e.type}</span>
  <span class="log-who">${e.name}</span>
  <span class="log-ses">${e.title} · ${e.start}</span>
</div>`).join('');
}

function renderAll(data) {
  const sessions = data.sessions || [];

  // Watch list (full + live only)
  const hot = sessions.filter(s => s.is_full || s.status==='live');
  const watchEl = document.getElementById('watch-list');
  const secWatch = document.getElementById('sec-watch');
  if (hot.length) {
    secWatch.style.display = 'flex';
    watchEl.innerHTML = hot.map(s => renderCard(s, false)).join('');
  } else {
    secWatch.style.display = 'none';
    watchEl.innerHTML = '';
  }

  // All sessions grid (exclude completed)
  const nonDone = sessions.filter(s => s.status !== 'completed');
  document.getElementById('all-sessions').innerHTML = nonDone.map(s => renderCard(s, true)).join('');

  renderThieves(data.thieves, sessions);
  renderActivity(data.activity || []);

  // Stats row
  const s = data.stats;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-chip"><div class="pip pip-g"></div>${s.total} TRACKED</div>
    <div class="stat-chip"><div class="pip pip-r"></div>${s.full_count} FULL</div>
    <div class="stat-chip"><div class="pip pip-c"></div>UPDATED ${ageStr(data.generated_at)}</div>
    <div class="stat-chip"><div class="pip pip-y"></div>NEXT SCAN ${fmtTs(data.next_scan_at)}</div>
  `;

  // Status bar
  document.getElementById('sbar-total').textContent   = s.total + ' SESSIONS';
  document.getElementById('sbar-full').textContent    = s.full_count + ' FULL';
  document.getElementById('sbar-updated').textContent = 'UPDATED ' + ageStr(data.generated_at);
}

// ── Clock ──────────────────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const D = ['SUN','MON','TUE','WED','THU','FRI','SAT'][n.getDay()];
  const M = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][n.getMonth()];
  const d = String(n.getDate()).padStart(2,'0');
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clk').textContent = `${D} ${M} ${d} ${n.getFullYear()}  ${h}:${m}:${s}`;
}

// ── Countdown updater (runs every second) ─────────────────────────────────
function updateCountdowns() {
  document.querySelectorAll('[data-start]').forEach(el => {
    const cd = countdown(el.dataset.start);
    if (cd) el.textContent = 'STARTS IN ' + cd;
  });
  document.getElementById('sbar-updated').textContent =
    'UPDATED ' + ageStr(DATA.generated_at);
  // keep stats row age fresh too
  const ageChip = document.querySelector('.stat-chip:nth-child(3)');
  if (ageChip) ageChip.innerHTML = `<div class="pip pip-c"></div>UPDATED ${ageStr(DATA.generated_at)}`;
}

// ── Background data refresh ────────────────────────────────────────────────
async function fetchFresh() {
  try {
    const res = await fetch('ppbrva_data.json?t=' + Date.now());
    if (!res.ok) return;
    const fresh = await res.json();
    if (fresh.generated_at !== DATA.generated_at) {
      DATA = fresh;
      renderAll(DATA);
    }
  } catch(e) { /* network error — keep showing current data */ }
}

function forceRefresh() {
  fetchFresh().then(() => renderAll(DATA));
}

// ── Boot ───────────────────────────────────────────────────────────────────
renderAll(DATA);
setInterval(tick, 1000);
setInterval(updateCountdowns, 1000);
setInterval(fetchFresh, 120_000);   // background refresh every 2 min
tick();
</script>
