    <script>
            // Smooth Accordion Animation Function
            function smoothToggle(details, forceOpen = null) {
                const content = details.querySelector('.group-content');
                if (!content) return;

                const isOpen = details.hasAttribute('open');
                const willOpen = forceOpen !== null ? forceOpen : !isOpen;

                if (isOpen === willOpen) return;

                if (willOpen) {
                    details.setAttribute('open', '');
                    const height = content.scrollHeight;
                    content.style.height = '0px';
                    content.style.opacity = '0';
                    content.style.overflow = 'hidden';

                    content.offsetHeight; // Trigger reflow

                    content.style.transition = 'height 0.35s ease-out, opacity 0.35s ease-out';
                    content.style.height = height + 'px';
                    content.style.opacity = '1';

                    setTimeout(() => {
                        content.style.height = '';
                        content.style.opacity = '';
                        content.style.overflow = '';
                        content.style.transition = '';
                    }, 350);
                } else {
                    const height = content.scrollHeight;
                    content.style.height = height + 'px';
                    content.style.opacity = '1';
                    content.style.overflow = 'hidden';

                    content.offsetHeight; // Trigger reflow

                    content.style.transition = 'height 0.35s ease-out, opacity 0.35s ease-out';
                    content.style.height = '0px';
                    content.style.opacity = '0';

                    setTimeout(() => {
                        details.removeAttribute('open');
                        content.style.height = '';
                        content.style.opacity = '';
                        content.style.overflow = '';
                        content.style.transition = '';
                    }, 350);
                }
            }

            // Lazy-render match history from JSON data attribute
            function renderMatches(details) {
                const matchList = details.querySelector('.match-list');
                if (!matchList || matchList.dataset.rendered) return;
                matchList.dataset.rendered = '1';

                var matches, internalId;
                try { matches = JSON.parse(details.dataset.matches || '[]'); } catch(e) { matches = []; }
                internalId = details.dataset.internalId || '';

                var profileLink = '<a class="profile-link" href="https://dashboard.dupr.com/dashboard/player/' + internalId + '" target="_blank" rel="noreferrer noopener" onclick="event.stopPropagation();event.preventDefault();window.open(this.href)">View Full DUPR Profile &rarr;</a>';

                if (!matches.length) {
                    matchList.innerHTML = '<div style="text-align:center;padding:10px 0">No recent matches found.</div>' + profileLink;
                    return;
                }

                var html = '';
                var lastEvent = null;
                for (var i = 0; i < matches.length; i++) {
                    var m = matches[i];
                    if (m.event && m.event !== lastEvent) {
                        html += '<div class="event-header">' + m.event + '</div>';
                        lastEvent = m.event;
                    }
                    var cls = m.impact_val > 0 ? 'trend-up' : m.impact_val < 0 ? 'trend-down' : 'trend-flat';
                    var sign = m.impact_val > 0 ? '+' : '';
                    var impactText = m.impact_val !== 0 ? '(' + sign + m.impact_val.toFixed(3) + ')' : '(-0.000)';

                    html += '<div class="match-row">'
                        + '<span class="match-date">' + m.date + '</span>'
                        + '<span class="match-score">' + m.score + ' <strong class="match-result ' + m.result + '">' + m.result + '</strong></span>'
                        + '<span class="match-impact-col"><span class="' + cls + '">' + impactText + '</span> <span class="lbl">' + m.format + '</span></span>'
                        + '</div>';
                    html += '<div class="match-opp-line">' + (m.opp_text || '') + '</div>';
                }
                matchList.innerHTML = html + profileLink;
            }

            // Smooth Player Card Animation Function
            function smoothPlayerToggle(details) {
                const dropdown = details.querySelector('.history-dropdown');
                if (!dropdown) return;

                const isOpen = details.hasAttribute('open');

                if (!isOpen) {
                    // --- Opening: lazy-render matches first ---
                    renderMatches(details);
                    details.setAttribute('open', '');
                    const targetHeight = dropdown.scrollHeight;
                    dropdown.style.height = '0px';
                    dropdown.style.opacity = '0';
                    dropdown.offsetHeight; // Force reflow before transition begins
                    dropdown.style.transition = 'height 0.22s ease-out, opacity 0.22s ease-out';
                    dropdown.style.height = targetHeight + 'px';
                    dropdown.style.opacity = '1';
                    setTimeout(() => {
                        dropdown.style.height = '';
                        dropdown.style.opacity = '';
                        dropdown.style.transition = '';
                    }, 220);
                } else {
                    // --- Closing ---
                    dropdown.style.height = dropdown.scrollHeight + 'px';
                    dropdown.style.opacity = '1';
                    dropdown.offsetHeight; // Force reflow before transition begins
                    dropdown.style.transition = 'height 0.22s ease-out, opacity 0.22s ease-out';
                    dropdown.style.height = '0px';
                    dropdown.style.opacity = '0';
                    setTimeout(() => {
                        details.removeAttribute('open');
                        dropdown.style.height = '';
                        dropdown.style.opacity = '';
                        dropdown.style.transition = '';
                    }, 220);
                }
            }

            // 1. Search Box Logic (Instant snappiness kept deliberately for search filtering)
            (function() {
                const input    = document.getElementById('searchInput');
                const clearBtn = document.getElementById('searchClear');

                function runSearch(searchTerm) {
                    const groups = document.querySelectorAll('.group-details');
                    groups.forEach(group => {
                        let hasVisiblePlayer = false;
                        const players = group.querySelectorAll('.player-details');
                        players.forEach(player => {
                            const playerName  = player.getAttribute('data-name') || "";
                            const notesElem   = player.querySelector('.player-notes');
                            const playerNotes = notesElem ? notesElem.textContent.toLowerCase() : "";
                            if (playerName.includes(searchTerm) || playerNotes.includes(searchTerm)) {
                                player.classList.remove('hidden');
                                hasVisiblePlayer = true;
                            } else {
                                player.classList.add('hidden');
                            }
                        });
                        if (searchTerm.length > 0) {
                            group.style.display = hasVisiblePlayer ? 'block' : 'none';
                            if (hasVisiblePlayer) group.setAttribute('open', '');
                        } else {
                            group.style.display = 'block';
                            group.removeAttribute('open');
                        }
                    });
                }

                input.addEventListener('input', function() {
                    const term = this.value.toLowerCase();
                    if (term.length > 0) {
                        clearBtn.classList.add('visible');
                    } else {
                        clearBtn.classList.remove('visible');
                    }
                    runSearch(term);
                });

                clearBtn.addEventListener('click', function() {
                    input.value = '';
                    clearBtn.classList.remove('visible');
                    input.focus();
                    runSearch('');
                });
            })();

            // 2. Handle manual clicks on category headers (Auto-scroll removed)
            document.querySelectorAll('.group-summary').forEach(summary => {
                summary.addEventListener('click', function(e) {
                    e.preventDefault();
                    const details = this.parentElement;
                    const willOpen = !details.hasAttribute('open');

                    // If opening, smoothly close all others
                    if (willOpen) {
                        document.querySelectorAll('.group-details').forEach(other => {
                            if (other !== details && other.hasAttribute('open')) {
                                smoothToggle(other, false);
                            }
                        });
                    }

                    // Smoothly open or close the targeted section
                    smoothToggle(details, willOpen);
                });
            });

            // 3. Accordion Jump Bar Logic (Auto-scroll kept)
            document.querySelectorAll('.jump-tab').forEach(tab => {
                tab.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetDetails = document.getElementById(targetId);

                    if (targetDetails) {
                        // Smoothly close all other groups
                        document.querySelectorAll('.group-details').forEach(details => {
                            if (details.id !== targetId && details.hasAttribute('open')) {
                                smoothToggle(details, false);
                            }
                        });

                        // Smoothly open target
                        smoothToggle(targetDetails, true);

                        // Small delay allows the DOM to recalculate heights before smoothly sliding down
                        setTimeout(() => {
                            targetDetails.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 350);

                        history.replaceState(null, null, '#' + targetId);
                    }
                });
            });

            // 4. Player Card Smooth Expand/Collapse
            document.querySelectorAll('.player-summary').forEach(summary => {
                summary.addEventListener('click', function(e) {
                    e.preventDefault();
                    smoothPlayerToggle(this.parentElement);
                });
            });

            // 5. Generate and inject Apple Touch Icon — DW, Teko
            (function () {
                var CYAN = '#00e5ff';
                var PINK = '#ff00a0';

                function renderIcon(font) {
                    var c = document.createElement('canvas');
                    c.width = 180; c.height = 180;
                    var W = 180, H = 180;
                    var ctx = c.getContext('2d');

                    // ── Background: dark with subtle gradient ──────────────
                    var bg = ctx.createLinearGradient(0, 0, W, H);
                    bg.addColorStop(0, '#0a0b14');
                    bg.addColorStop(1, '#12091e');
                    ctx.fillStyle = bg;
                    ctx.fillRect(0, 0, W, H);

                    // ── Grid lines for texture ─────────────────────────────
                    ctx.strokeStyle = 'rgba(0, 229, 255, 0.06)';
                    ctx.lineWidth = 0.5;
                    for (var i = 0; i < W; i += 12) {
                        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
                    }

                    // ── Neon border glow ───────────────────────────────────
                    var border = 4;
                    var outerR = 44;
                    var innerR = outerR - border;

                    // Outer glow pass
                    ctx.shadowColor = CYAN;
                    ctx.shadowBlur = 16;
                    ctx.strokeStyle = CYAN;
                    ctx.lineWidth = border;
                    var x = border/2, y = border/2, w = W - border, h = H - border;
                    ctx.beginPath();
                    ctx.moveTo(x + outerR, y);
                    ctx.lineTo(x + w - outerR, y);
                    ctx.arcTo(x + w, y,     x + w, y + outerR,     outerR);
                    ctx.lineTo(x + w, y + h - outerR);
                    ctx.arcTo(x + w, y + h, x + w - outerR, y + h, outerR);
                    ctx.lineTo(x + outerR, y + h);
                    ctx.arcTo(x,     y + h, x,     y + h - outerR, outerR);
                    ctx.lineTo(x,     y + outerR);
                    ctx.arcTo(x,     y,     x + outerR, y,         outerR);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    // ── "DW" with gradient fill + glow ─────────────────────
                    ctx.textAlign    = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font         = '700 100px ' + font;

                    // Measure for gradient
                    var metrics = ctx.measureText('DW');
                    var txtW = metrics.width;
                    var grad = ctx.createLinearGradient(
                        W/2 - txtW/2, 0, W/2 + txtW/2, H
                    );
                    grad.addColorStop(0,   CYAN);
                    grad.addColorStop(0.5, PINK);
                    grad.addColorStop(1,   '#ffc400');

                    // Shadow / glow layers
                    ctx.shadowColor = PINK;
                    ctx.shadowBlur  = 24;
                    ctx.fillStyle   = grad;
                    ctx.fillText('DW', W / 2, H / 2 - 2);

                    // Second pass for extra bloom
                    ctx.shadowColor = CYAN;
                    ctx.shadowBlur  = 12;
                    ctx.fillText('DW', W / 2, H / 2 - 2);
                    ctx.shadowBlur  = 0;

                    // ── Tiny "DUPR WATCH" subtitle ─────────────────────────
                    ctx.fillStyle    = 'rgba(0, 229, 255, 0.6)';
                    ctx.font         = '600 11px ' + font;
                    ctx.letterSpacing = '3px';
                    ctx.fillText('DUPR WATCH', W / 2, H / 2 + 56);

                    // ── Inject as apple-touch-icon ─────────────────────────
                    var link = document.createElement('link');
                    link.rel  = 'apple-touch-icon';
                    link.href = c.toDataURL('image/png');
                    document.head.appendChild(link);

                    // Also set as favicon
                    var fav = document.createElement('link');
                    fav.rel  = 'icon';
                    fav.type = 'image/png';
                    fav.href = c.toDataURL('image/png');
                    document.head.appendChild(fav);
                }

                var tekoFace = new FontFace(
                    'Teko',
                    'url(https://fonts.gstatic.com/s/teko/v20/LYjNdG7kmE0gdQhfgCNqqVIuTN4.woff2)',
                    { weight: '700' }
                );
                tekoFace.load()
                    .then(function (loaded) {
                        document.fonts.add(loaded);
                        renderIcon('"Teko", sans-serif');
                    })
                    .catch(function () {
                        renderIcon('-apple-system, BlinkMacSystemFont, sans-serif');
                    });
            })();
            // 6. Refresh helpers — cache-busted hard reload
            function hardRefresh() {
                var btn = document.getElementById('refreshBtn');
                if (btn) btn.classList.add('spinning');
                var url = window.location.pathname + '?t=' + Date.now();
                window.location.replace(url);
            }

            document.getElementById('refreshBtn').addEventListener('click', hardRefresh);

            // Pull-to-refresh: swipe down from top of page
            (function () {
                var startY      = 0;
                var pulling     = false;
                var THRESHOLD   = 80;
                var indicator   = document.getElementById('ptrIndicator');

                document.addEventListener('touchstart', function (e) {
                    if (window.scrollY === 0) {
                        startY  = e.touches[0].clientY;
                        pulling = true;
                    }
                }, { passive: true });

                document.addEventListener('touchmove', function (e) {
                    if (!pulling) return;
                    var dist = e.touches[0].clientY - startY;
                    if (dist > 20) indicator.classList.add('visible');
                    if (dist < 10) indicator.classList.remove('visible');
                }, { passive: true });

                document.addEventListener('touchend', function (e) {
                    if (!pulling) return;
                    pulling = false;
                    var dist = e.changedTouches[0].clientY - startY;
                    indicator.classList.remove('visible');
                    if (dist >= THRESHOLD) hardRefresh();
                });
            })();

            // 7. Autofocus search box on page load
            document.getElementById('searchInput').focus();

            // 8. Sort players within groups (tap to toggle direction)
            document.querySelectorAll('.sort-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var bar = this.closest('.sort-bar');
                    var sortKey = this.getAttribute('data-sort');
                    var wasActive = this.classList.contains('active');
                    var wasAsc = this.getAttribute('data-dir') === 'asc';

                    // Reset all buttons
                    bar.querySelectorAll('.sort-btn').forEach(function(b) {
                        b.classList.remove('active');
                        b.removeAttribute('data-dir');
                        b.textContent = b.getAttribute('data-label') || b.textContent.replace(/ [▲▼]$/, '');
                    });

                    // Store original label on first click
                    if (!this.getAttribute('data-label')) {
                        this.setAttribute('data-label', this.textContent);
                    }
                    var label = this.getAttribute('data-label');

                    // Toggle direction if tapping the same button
                    var desc = wasActive && !wasAsc ? false : true;
                    if (wasActive && wasAsc) desc = true; // wrap back to desc
                    this.classList.add('active');
                    this.setAttribute('data-dir', desc ? 'desc' : 'asc');
                    this.textContent = label + (desc ? ' ▼' : ' ▲');

                    var content = this.closest('.group-content');
                    var players = Array.from(content.querySelectorAll('.player-details'));

                    players.sort(function(a, b) {
                        if (sortKey === 'name') {
                            var result = (a.getAttribute('data-name') || '').localeCompare(b.getAttribute('data-name') || '');
                            return desc ? result : -result;
                        }
                        var aVal = parseFloat(a.getAttribute('data-' + sortKey)) || 0;
                        var bVal = parseFloat(b.getAttribute('data-' + sortKey)) || 0;
                        // NR (0) always sinks to bottom regardless of direction
                        if (aVal === 0 && bVal !== 0) return 1;
                        if (bVal === 0 && aVal !== 0) return -1;
                        if (aVal === 0 && bVal === 0) return 0;
                        return desc ? bVal - aVal : aVal - bVal;
                    });

                    players.forEach(function(el) { content.appendChild(el); });
                });
            });

    </script>
</body>
</html>
