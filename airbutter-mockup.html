<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Airbutter mockups — A / B / C</title>
<style>
:root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
* { box-sizing: border-box; }
body { margin: 0; padding: 24px 0 60px; background: #e7e3dc; color: #333; }

.label {
  max-width: 390px; margin: 0 auto 10px; padding: 8px 14px;
  font-size: 10px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: #555;
}
.mockup {
  max-width: 390px; margin: 0 auto 32px;
  background: var(--bg); color: var(--txt-2);
  border-radius: 18px; overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* ── OPTION A — Airbnb Faithful ───────────────────────────────────────── */
.mockup-a {
  --bg:          #fafafa;
  --panel:       #ffffff;
  --panel-2:     #f7f7f7;
  --panel-input: #ffffff;
  --line:        #ebebeb;
  --line-soft:   #d4d4d4;
  --txt:         #222222;   /* Hof */
  --txt-2:       #484848;
  --txt-mid:     #717171;   /* Foggy */
  --txt-dim:     #9b9b9b;
  --txt-faint:   #cfcfcf;
  --cyan:        #008489;   /* Babu teal — W */
  --pink:        #ff5a5f;   /* Rausch coral — L */
  --gold:        #b88500;
  --partner:     #5a6cb8;
}

/* ── OPTION B — Coral-forward ─────────────────────────────────────────── */
.mockup-b {
  --bg:          #fafafa;
  --panel:       #ffffff;
  --panel-2:     #f7f5f3;
  --panel-input: #ffffff;
  --line:        #ece9e4;
  --line-soft:   #d3cec7;
  --txt:         #2a2522;
  --txt-2:       #4a4642;
  --txt-mid:     #7a7570;
  --txt-dim:     #a09b95;
  --txt-faint:   #c8c2bc;
  --cyan:        #ff5a5f;   /* Rausch coral — W (hero) */
  --pink:        #8b2545;   /* Deep wine — L */
  --gold:        #a86b00;
  --partner:     #6a5cb8;
}

/* ── OPTION C — Smooth modern (Airbnb feel, not brand colors) ──────────── */
.mockup-c {
  --bg:          #fbfaf7;   /* warm paper white */
  --panel:       #ffffff;
  --panel-2:     #f5f3ee;
  --panel-input: #ffffff;
  --line:        #ece9e3;
  --line-soft:   #d6d2c8;
  --txt:         #2a2a2a;
  --txt-2:       #4a4a4a;
  --txt-mid:     #757575;
  --txt-dim:     #9a9a9a;
  --txt-faint:   #c0c0c0;
  --cyan:        #007a8a;   /* calm teal — W */
  --pink:        #e25555;   /* soft coral — L */
  --gold:        #a06800;
  --partner:     #6a5cb8;
}

/* ── shared components, all token-driven ───────────────────────────────── */
.h { padding: 18px 16px 12px; border-bottom: 1px solid var(--line); }
.h h1 {
  font-size: 24px; font-weight: 800; font-style: italic; letter-spacing: 1px;
  text-transform: uppercase; color: var(--cyan); margin: 0 0 4px;
}
.h-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--txt-dim); letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 12px;
}
.chip {
  margin-left: auto; padding: 5px 10px; border: 1px solid var(--line);
  border-radius: 999px; font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
  color: var(--txt-mid); display: inline-flex; align-items: center; gap: 5px;
}
.refresh { color: var(--txt-dim); font-size: 13px; }
.search {
  width: 100%; padding: 12px 14px; background: var(--panel-input);
  border: 1px solid var(--line); border-radius: 12px;
  color: var(--txt-mid); font-size: 14px;
}
.jump { display: flex; gap: 8px; margin-top: 12px; }
.tab {
  padding: 7px 14px; background: var(--panel-2); border-radius: 999px;
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; color: var(--txt);
}

.hero {
  margin: 14px 12px; padding: 12px 14px; border-radius: 12px;
  border: 1px solid var(--line);
  background: linear-gradient(90deg,
    color-mix(in srgb, var(--cyan) 10%, transparent),
    color-mix(in srgb, var(--pink) 8%, transparent));
}
.hero-title {
  font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.hero-cta {
  font-size: 10px; font-weight: 800; letter-spacing: 1px; color: var(--cyan);
  background: color-mix(in srgb, var(--cyan) 14%, transparent);
  border: 1px solid color-mix(in srgb, var(--cyan) 45%, transparent);
  border-radius: 4px; padding: 2px 8px;
}
.hero-glabel {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--txt-mid); text-transform: uppercase; display: block; margin-bottom: 4px;
}
.hero-row { display: flex; gap: 8px; }
.cell {
  flex: 1; background: var(--panel-2); padding: 6px 10px; border-radius: 6px;
  display: flex; align-items: center; gap: 6px;
}
.cell.w { border-left: 3px solid var(--cyan); }
.cell.l { border-left: 3px solid var(--pink); }
.cell-stat { display: flex; align-items: baseline; gap: 2px; }
.cell-count { font-size: 18px; font-weight: 900; }
.cell-type { font-size: 11px; font-weight: 700; }
.cell.w .cell-count, .cell.w .cell-type { color: var(--cyan); }
.cell.l .cell-count, .cell.l .cell-type { color: var(--pink); }
.cell-name {
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--txt);
}

.sec {
  font-size: 14px; font-weight: 700; color: var(--txt);
  text-transform: uppercase; letter-spacing: 2px;
  border-bottom: 1px solid var(--line); border-left: 4px solid var(--cyan);
  padding: 8px 12px 8px; margin: 0 12px;
  background: linear-gradient(90deg, color-mix(in srgb, var(--cyan) 6%, transparent), transparent);
}

.sort { display: flex; gap: 6px; padding: 10px 12px 4px; overflow-x: auto; }
.sb {
  padding: 7px 13px; background: var(--panel-2); border: 1px solid var(--line);
  border-radius: 999px; font-size: 10px; font-weight: 600;
  color: var(--txt-mid); white-space: nowrap;
}
.sb.active {
  background: color-mix(in srgb, var(--cyan) 16%, transparent);
  border-color: color-mix(in srgb, var(--cyan) 50%, transparent);
  color: var(--cyan);
}

.pillwrap {
  padding: 8px 12px 4px; background: var(--bg);
  border-bottom: 1px solid var(--line); margin-top: 4px;
}
.pill {
  display: inline-block; padding: 4px 12px;
  font-family: ui-monospace, "SF Mono", monospace;
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--txt); background: var(--panel-2);
  border: 1px solid var(--line); border-radius: 12px;
}

.card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
  margin: 4px 12px; padding: 8px 8px; display: flex; align-items: center; gap: 8px;
}
.streak-col { width: 60px; text-align: center; flex-shrink: 0; }
.badge {
  display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
  padding: 2px 6px; border-radius: 10px; border: 1px solid;
}
.badge.w {
  background: color-mix(in srgb, var(--cyan) 14%, transparent);
  color: var(--cyan); border-color: var(--cyan);
}
.badge.l {
  background: color-mix(in srgb, var(--pink) 14%, transparent);
  color: var(--pink); border-color: var(--pink);
}
.card-name {
  flex: 1; font-size: 14px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--txt);
}
.card-scores { display: flex; flex-direction: column; gap: 1px; text-align: right; flex-shrink: 0; }
.card-score { font-size: 13px; font-weight: 700; color: var(--txt); white-space: nowrap; }
.trend-up { color: var(--cyan); }
.trend-down { color: var(--pink); }
.lbl { font-size: 13px; color: var(--txt-mid); font-weight: 700; }

.expanded {
  background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
  margin: 4px 12px; overflow: hidden;
}
.expanded-summary {
  padding: 8px; display: flex; align-items: center; gap: 8px;
}
.career { background: var(--panel-2); padding: 12px; border-top: 1px solid var(--line); }
.career-label {
  font-size: 13px; font-weight: 800; letter-spacing: 1.5px;
  color: var(--txt); text-transform: uppercase; margin-bottom: 10px;
}
.info-row { display: flex; gap: 3px; font-size: 11px; color: var(--txt-mid); margin-bottom: 3px; line-height: 1.5; }
.info-label { color: var(--txt-dim); font-weight: 600; }
.partner-link { color: var(--partner); font-weight: 600; text-decoration: underline dotted; text-decoration-color: color-mix(in srgb, var(--partner) 40%, transparent); }

.cs-row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
.cs-fmt {
  font-size: 10px; font-weight: 900; letter-spacing: 1px;
  text-transform: uppercase; color: var(--txt-dim); width: 16px; text-align: center;
}
.cs-bar {
  flex: 1; border-radius: 6px; padding: 7px 10px;
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(to right,
    color-mix(in srgb, var(--cyan) 32%, transparent) 0,
    color-mix(in srgb, var(--cyan) 32%, transparent) var(--win, 50%),
    color-mix(in srgb, var(--pink) 18%, transparent) var(--win, 50%),
    color-mix(in srgb, var(--pink) 18%, transparent) 100%);
  box-shadow: inset 0 0 0 1px var(--line);
}
.cs-record { font-size: 12px; font-weight: 800; }
.cs-w { color: var(--cyan); }
.cs-l { color: var(--txt-2); }
.cs-sep { color: var(--txt-dim); padding: 0 2px; font-weight: 400; }
.cs-pct {
  font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
  background: var(--panel); margin-left: auto; color: var(--cyan);
}

.match-block { background: var(--panel); padding: 8px 12px; }
.match-row {
  padding: 6px 0 6px 10px; margin: 4px 0;
  border-left: 3px solid var(--line-soft); border-radius: 2px;
}
.match-row.w { border-left-color: var(--cyan); }
.match-row.l { border-left-color: var(--pink); }
.match-line { font-size: 12px; color: var(--txt-mid); padding: 2px 0; }
.match-vs { color: var(--txt-mid); font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 700; }
.match-score { font-weight: 700; color: var(--txt-2); font-size: 13px; }
.match-result-w { color: var(--cyan); font-weight: 800; font-size: 14px; }
.match-result-l { color: var(--pink); font-weight: 800; font-size: 14px; }

.profile {
  display: block; text-align: center; margin: 8px 12px 12px; padding: 10px;
  background: var(--panel-2); border-radius: 6px;
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--txt);
}
</style>
</head>
<body>

<section class="mockup mockup-a"></section>
